<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>데일리 타로 · VoiceSaju</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;1,400;1,500&family=Gowun+Batang:wght@400;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<link rel="stylesheet" href="../styles.css">
</head>
<body data-current="default">

<nav class="nav-top">
  <a href="../index.html" class="nav-top__back">← 뒤로</a>
  <span class="nav-top__brand">VoiceSaju</span>
  <span class="nav-top__menu">ⓘ</span>
</nav>

<div class="quota-banner">
  <span>이번 주 무료 1회 남음</span>
  <a href="login.html" class="c-amber-200" style="text-decoration: underline; text-underline-offset: 4px;">구독</a>
</div>

<main class="page__main">
  <section class="container-narrow">

    <div class="state state--default">
      <h1 class="t-h2 display-han c-cream-50">오늘의 카드</h1>
      <hr class="divider divider--short mt-8" style="margin-bottom: var(--space-4);">

      <div class="tarot-stage">
        <button class="tarot-card" type="button" aria-label="카드 뽑기">
          <div class="tarot-card__inner">
            <div class="tarot-card__face tarot-card__back">VS</div>
            <div class="tarot-card__face tarot-card__front">
              <div class="tarot-card__front__symbol">☾</div>
              <div class="tarot-card__front__name">The Moon</div>
              <div class="tarot-card__front__num">XVIII</div>
            </div>
          </div>
        </button>
        <p class="tarot-tap-hint">탭해서 뽑기</p>
      </div>

      <hr class="divider mt-8" style="margin-bottom: var(--space-2);">
      <p class="hanja-row">甲乙丙丁&nbsp;&nbsp;메이저 아르카나 22장</p>
    </div>

    <div class="state state--loading">
      <h1 class="t-h2 display-han c-cream-50">오늘의 카드</h1>
      <hr class="divider divider--short mt-8" style="margin-bottom: var(--space-4);">
      <div class="tarot-stage">
        <div class="tarot-card" aria-pressed="true">
          <div class="tarot-card__inner">
            <div class="tarot-card__face tarot-card__back">VS</div>
            <div class="tarot-card__face tarot-card__front">
              <div class="tarot-card__front__symbol">☾</div>
              <div class="tarot-card__front__name">The Moon</div>
              <div class="tarot-card__front__num">XVIII</div>
            </div>
          </div>
        </div>
        <div class="cluster gap-3 mt-6"><span class="spinner"></span><span class="t-meta c-cream-300">목소리 깨우는 중</span></div>
      </div>
    </div>

    <div class="state state--empty">
      <h1 class="t-h2 display-han c-cream-50">오늘의 카드</h1>
      <hr class="divider divider--short mt-8" style="margin-bottom: var(--space-4);">

      <div class="tarot-stage">
        <div class="tarot-card" aria-pressed="true">
          <div class="tarot-card__inner">
            <div class="tarot-card__face tarot-card__back">VS</div>
            <div class="tarot-card__face tarot-card__front">
              <div class="tarot-card__front__symbol">☾</div>
              <div class="tarot-card__front__name">The Moon</div>
              <div class="tarot-card__front__num">XVIII</div>
            </div>
          </div>
        </div>
      </div>

      <hr class="divider mt-8" style="margin-bottom: var(--space-6);">

      <div class="subtitle-band" aria-live="polite">
        <span class="subtitle-line subtitle-line--past">오늘은…</span>
        <span class="subtitle-line subtitle-line--past">숨겨진 진실이 보이는 날.</span>
        <span class="subtitle-line subtitle-line--current">섣불리 결정하지 말게나.</span>
      </div>

      <div class="voice-player__controls mt-6">
        <button class="voice-player__play" aria-label="일시정지">❚❚</button>
        <div class="voice-player__progress" style="--progress: 32%;" aria-hidden="true"></div>
        <span class="voice-player__time">0:12 / 0:38</span>
      </div>

      <div class="share-row mt-8">
        <button class="share-btn">공유하기</button>
        <button class="share-btn">명대사 저장</button>
      </div>
    </div>

    <div class="state state--error">
      <h1 class="t-h2 display-han c-cream-50">오늘의 카드</h1>
      <hr class="divider divider--short mt-8" style="margin-bottom: var(--space-4);">
      <div class="tarot-stage">
        <div class="tarot-card" style="opacity: 0.4;">
          <div class="tarot-card__inner">
            <div class="tarot-card__face tarot-card__back" style="filter: grayscale(1);">🔒</div>
          </div>
        </div>
        <p class="tarot-tap-hint c-error" style="animation: none;">이번 주는 다 봤어.</p>
      </div>
      <div class="card card--amber mt-8" style="border-left-color: var(--amber-400);">
        <p class="t-body c-cream-50">구독하면 매일 볼 수 있어.</p>
        <p class="t-meta c-cream-300 mt-2">사주도 매달 1회 포함. ₩9,900/월.</p>
      </div>
      <a href="payment.html" class="btn btn-primary btn--full mt-6">구독하고 매일 받기</a>
    </div>

  </section>
</main>

<nav class="tab-bar" aria-label="주요 메뉴">
  <button class="tab-bar__item"><span class="tab-bar__icon"></span>홈</button>
  <button class="tab-bar__item"><span class="tab-bar__icon"></span>사주</button>
  <button class="tab-bar__item" aria-current="page"><span class="tab-bar__icon"></span>타로</button>
  <button class="tab-bar__item"><span class="tab-bar__icon"></span>마이</button>
</nav>

<div class="state-switcher" role="group" aria-label="State toggle">
  <button class="state-switcher__btn" data-target="default" aria-pressed="true">CARD BACK</button>
  <button class="state-switcher__btn" data-target="loading">FLIPPING</button>
  <button class="state-switcher__btn" data-target="empty">REVEALED</button>
  <button class="state-switcher__btn" data-target="error">EXHAUSTED</button>
</div>

<script>
document.querySelectorAll('.state-switcher__btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const t = btn.dataset.target;
    document.querySelectorAll('.state-switcher__btn').forEach(b => b.setAttribute('aria-pressed', String(b.dataset.target === t)));
    document.body.setAttribute('data-current', t);
  });
});

document.querySelector('.tarot-card[type="button"]')?.addEventListener('click', function () {
  const pressed = this.getAttribute('aria-pressed') === 'true';
  this.setAttribute('aria-pressed', String(!pressed));
});
</script>
</body>
</html>
